<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <filter id="diamondGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feFlood flood-color="#34d399" flood-opacity="0.4" result="green"/>
      <feComposite in="green" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- brand row (top) -->
  <g transform="translate(64, 60)" filter="url(#diamondGlow)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#diamondGrad)"/>
    <path d="M 28 12 L 12 28 L 28 44 L 44 28 Z" fill="#0a0a0a"/>
  </g>
  <text x="140" y="98" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="-0.5">bonsai.js</text>
  <g transform="translate(282, 76)">
    <rect x="0" y="0" width="64" height="26" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="32" y="18" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#a1a1aa" text-anchor="middle">v2.5.2</text>
  </g>

  <!-- headline (center) -->
  <text x="64" y="280" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">free <tspan fill="url(#titleGrad)">frontier</tspan></text>
  <text x="64" y="380" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">coding models</text>

  <!-- subtitle -->
  <text x="64" y="440" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a1a1aa">open source dashboard for bonsai · GPT-5, Claude Opus 4.7, Gemini, GLM, Llama</text>
  <text x="64" y="472" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a1a1aa">all free via <tspan font-family="JetBrains Mono, ui-monospace, monospace" font-size="19" fill="#34d399">bon api</tspan></text>

  <!-- bottom stats row -->
  <g transform="translate(64, 540)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#34d399" letter-spacing="-0.5">199</text>
    <text x="0" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b" letter-spacing="1.2">MODELS</text>

    <text x="100" y="0" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#fbbf24" letter-spacing="-0.5">20M</text>
    <text x="100" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b" letter-spacing="1.2">TOK/DAY</text>

    <text x="220" y="0" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#38bdf8" letter-spacing="-0.5">$0</text>
    <text x="220" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b" letter-spacing="1.2">COST</text>

    <text x="290" y="0" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#fb7185" letter-spacing="-0.5">0</text>
    <text x="290" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b" letter-spacing="1.2">TELEMETRY</text>
  </g>

  <!-- right footer -->
  <text x="1136" y="540" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#71717a" text-anchor="end">github.com/DexCodeSX/Secret</text>
  <text x="1136" y="562" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#52525b" text-anchor="end">termux · linux · macos · windows</text>
</svg>
