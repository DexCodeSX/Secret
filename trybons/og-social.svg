<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <radialGradient id="aurora1" cx="20%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="60%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="brandText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="diamondGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feFlood flood-color="#10b981" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#aurora1)"/>
  <rect width="1280" height="640" fill="url(#aurora2)"/>
  <rect width="1280" height="640" fill="url(#aurora3)"/>

  <!-- diamond mark, oversized, off-canvas glow -->
  <g transform="translate(80, 80)" filter="url(#diamondGlow)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#diamond)"/>
    <path d="M 32 12 L 12 32 L 32 52 L 52 32 Z" fill="#000"/>
  </g>

  <!-- wordmark -->
  <text x="170" y="124" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="-1">bonsai.js</text>
  <g transform="translate(322, 96)">
    <rect width="78" height="26" rx="13" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.30)"/>
    <text x="39" y="18" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#34d399" text-anchor="middle" font-weight="700">v2.5.19</text>
  </g>

  <!-- social handle, top right -->
  <g transform="translate(1200, 110)">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#71717a" text-anchor="end">@dexcodesxs/bon</text>
  </g>

  <!-- giant headline -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="86" font-weight="900" letter-spacing="-4" fill="#ffffff">claude opus 4.7</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="86" font-weight="900" letter-spacing="-4" fill="url(#brandText)">free. unlimited.</text>

  <!-- single line tagline -->
  <text x="80" y="436" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a1a1aa" letter-spacing="-0.3">a CLI that pretends to be 199 models. routes them all to opus 4.7 [1m].</text>

  <!-- the install command, hero block -->
  <g transform="translate(80, 482)">
    <rect width="1120" height="70" rx="14" fill="url(#cardBg)" stroke="rgba(255,255,255,0.10)"/>
    <text x="28" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#52525b">$</text>
    <text x="56" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#ffffff" font-weight="500">npm i -g @dexcodesxs/bon</text>
    <text x="430" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#52525b">→</text>
    <text x="460" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#34d399" font-weight="500">bon</text>
    <text x="510" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#71717a">login</text>
    <text x="585" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#52525b">·</text>
    <text x="600" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#34d399" font-weight="500">bon</text>
    <text x="650" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#71717a">codex</text>
    <text x="725" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#52525b">·</text>
    <text x="740" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#34d399" font-weight="500">bon</text>
    <text x="790" y="44" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#71717a">ui</text>
    <!-- copy hint -->
    <g transform="translate(1040, 22)">
      <rect width="60" height="26" rx="13" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.25)"/>
      <text x="30" y="18" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="600">copy</text>
    </g>
  </g>

  <!-- bottom strip -->
  <line x1="80" y1="588" x2="1200" y2="588" stroke="rgba(255,255,255,0.06)"/>
  <text x="80" y="612" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#71717a">github.com/DexCodeSX/bons</text>
  <text x="640" y="612" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#52525b" text-anchor="middle">·  termux  ·  linux  ·  mac  ·  windows  ·</text>
  <text x="1200" y="612" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#71717a" text-anchor="end">MIT · zero telemetry</text>
</svg>
